{% extends 'base.html' %}

{% block content %}
    <h1>Student Roster</h1>
    <a href="{% url 'add_student' %}" class="btn">+ Add New Student</a>
    
    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Year</th>
            <th>Actions</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.course }}</td>
            <td>{{ student.year }}</td>
            <td>
                <a href="{% url 'edit_student' student.id %}" class="btn">Edit</a>
                <a href="{% url 'delete_student' student.id %}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
