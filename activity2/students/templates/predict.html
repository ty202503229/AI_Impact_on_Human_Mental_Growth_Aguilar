{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">AI Impact on Mental Growth - Prediction Form</h4>
            </div>
            <div class="card-body">
                
                {% if result %}
                    <div class="alert alert-success mt-3 pb-0">
                        <h4 class="alert-heading">Prediction Result:</h4>
                        <p class="fs-4 fw-bold">{{ result }}</p>
                    </div>
                    <hr>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        {% for field in form %}
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold" for="{{ field.id_for_label }}">
                                    {{ field.name|title }}
                                </label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small">{{ field.errors }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Run ML Prediction</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
