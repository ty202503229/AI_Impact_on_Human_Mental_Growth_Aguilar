{% extends 'base.html' %}

{% block content %}
    <h1>Library Books</h1>
    <a href="{% url 'add_book' %}" class="btn">+ Add New Book</a>
    
    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Year Published</th>
            <th>Actions</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.year_published }}</td>
            <td>
                <a href="{% url 'edit_book' book.id %}" class="btn">Edit</a>
                <a href="{% url 'delete_book' book.id %}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
